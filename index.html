function calcScore(placar,minuto,liga,isCup){isCup=isCup||false;var pts=(placar||"0-0").split("-");var g1=parseInt(pts[0])||0,g2=parseInt(pts[1])||0;var tot=g1+g2,diff=Math.abs(g1-g2);var sc=0,fp=[],fn=[],sbd={},bloq=false;var il=getLiga(liga);var lm=il?il.m:70,la=il?il.a:-5;if(tot>=3){bloq=true;fn.push("🔴 BLOQUEADO — "+tot+" gols");}if(!bloq){var bg=tot<=1?30:tot===2?15:0;sc+=bg;sbd["⚽ Gols"]="+"+bg;if(bg===30)fp.push("✅ Placar fechado — +30pts");else if(bg===15)fp.push("✅ 2 gols — +15pts");var bs=minuto>=87?20:minuto>=85?15:minuto>=84?8:0;sc+=bs;sbd["🔄 Subs (est.)"]="+"+bs;if(bs>=15)fp.push("✅ Min "+minuto+"' — times sem energia");sc+=15;sbd["🎯 Chutes (est.)"]="+15";sc+=5;sbd["⚡ Faltas (est.)"]="+5";sc+=7;sbd["🚩 Escan. (est.)"]="+7";sc+=la;sbd["🏆 Liga"]=(la>=0?"+":"")+la;if(la===0)fp.push("✅ Liga alta confiança");else if(la<=-10)fn.push("⚠️ Liga baixa confiança");var bc=0;if(diff>=3){bc=8;fp.push("✅ Vantagem de "+diff+" gols");}else if(diff>=2){bc=5;fp.push("✅ Vantagem de 2 gols");}else if(diff===1&&minuto>=87){bc=-5;fn.push("⚠️ Dif. 1 no "+minuto+"'");}else if(diff===0&&minuto>=85){bc=-12;fn.push("❌ Empate no "+minuto+"'");}if(bc!==0){sc+=bc;sbd["📊 Contexto"]=(bc>=0?"+":"")+bc;}if(isKO(liga,isCup)){var pk=diff===0?-20:diff===1?-12:-3;sc+=pk;sbd["🏆 Mata-mata"]=""+pk;if(pk<=-12)fn.push("⚠️ Mata-mata — risco elevado");}sc=Math.max(0,Math.min(99,sc));}var an="";if(bloq)an="BLOQUEADO — "+fn[0];else if(diff>=2)an="Vantagem de "+diff+" gols no "+minuto+"'. Alta confiança para Under.";else if(diff===0)an="⚠️ Empate no "+minuto+"'. Risco elevado — avaliar com cuidado.";else an="Score "+sc+"/99. Monitorar evolução antes de entrar.";var dec="EVITAR",di="❌";if(!bloq){if(sc>=lm){dec="ENTRAR";di="✅";}else if(sc>=lm-10){dec="AGUARDAR";di="⏳";}}return{sc:sc,fp:fp,fn:fn,an:an,sbd:sbd,bloq:bloq,dec:dec,di:di,lm:lm};}
function buscarStats(id){if(!id)return Promise.resolve(null);var url=LBASE+"/scores/statistics.json?key="+LKEY+"&secret="+LSEC+"&match_id="+id;return fetch(url,{headers:{"Accept":"application/json"}}).then(function(r){if(!r.ok)return null;return r.json();}).then(function(d){if(!d)return null;var st=null;if(d.data&&d.data.match&&d.data.match.stats)st=d.data.match.stats;else if(d.data&&d.data.stats)st=d.data.stats;else if(d.stats)st=d.stats;else if(d.data)st=d.data;if(Array.isArray(st)){var obj={};st.forEach(function(item){if(item.type)obj[item.type]=(item.home||"0")+":"+(item.away||"0");});st=obj;}return st?{data:st}:null;}).catch(function(){return null;});}

function doScan(){if(scanning)return;scanning=true;document.getElementById("bscan").disabled=true;document.getElementById("bscan").innerHTML='<span class="spin">⚡</span> Buscando...';setSt("","⚡ Buscando jogos...");countdown=30;buscarJogos().then(function(todos){var naJ=todos.filter(function(j){return j.minuto>=78&&j.minuto<=97;});var proms=naJ.map(function(j){if(!j.id)return Promise.resolve(Object.assign({},j,calcScore(j.placar,j.minuto,j.liga,j.isCup)));return buscarStats(j.id).then(function(st){return Object.assign({},j,calcScore(j.placar,j.minuto,j.liga,j.isCup));});});return Promise.all(proms).then(function(an){an.sort(function(a,b){return b.sc-a.sc;});var me=an.filter(function(j){return j.minuto>=84&&j.minuto<=86&&j.sc>=70;});return{todos:todos,an:an,naJ:naJ,me:me};});}).then(function(res){var todos=res.todos,an=res.an,naJ=res.naJ,me=res.me;var il,lm;var vd=an.filter(function(j){if(j.minuto>=84&&j.minuto<=86)return false;il=getLiga(j.liga);lm=il?il.m:70;return j.sc>=lm&&!j.bloq;});var fresh=vd.filter(function(j){return!prevKeys[j.jogo];});if(fresh.length>0){playBeep();try{navigator.vibrate([500,150,500,150,800]);}catch(e){}fresh.forEach(function(j){sendNotif(j.jogo,j.sc,j.minuto);salvarSinal(j.jogo,j.placar,j.minuto,j.liga,j.sc,null);});var ts=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});hist=fresh.map(function(j){return Object.assign({},j,{ts:ts});}).concat(hist).slice(0,30);}prevKeys={};vd.forEach(function(j){prevKeys[j.jogo]=true;});document.getElementById("stv").textContent=todos.length;document.getElementById("stj").textContent=naJ.length;document.getElementById("ste").textContent=vd.length;document.getElementById("stm").textContent=me.length;var gb=document.getElementById("gbadge");if(vd.length>0){gb.textContent="🚨 "+vd.length+" ENTRAR";gb.style.display="inline-block";}else gb.style.display="none";lastA=an;lastT=todos;renderAll(an,todos,me);var h=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});setSt("o
